<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gerenciamento de Tarefas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#0b408f;
            
        }

        .navbar{
            box-shadow:0 2px 5px rgb(0, 0, 0);
        }

        .kanban-card{
            min-height:450px;
        }

        .card-header{
            font-weight:bold;
            text-align:center;
        }

        .tarefa{
            border-left:5px solid #ff0000;
            margin-bottom:12px;
            transition:.2s;
        }

        .tarefa:hover{
            transform:scale(1.02);
        }

        .titulo{
            font-size:18px;
            font-weight:bold;
        }

        .descricao{
            color:#242323;
            margin-top:8px;
        }

        .botoes{
            margin-top:12px;
        }

        textarea{
            resize:none;
        }

        .tarefa.progresso { border-left-color: #ff1808; }
        .tarefa.concluido { border-left-color: #ff0000; }
    </style>

</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

    <div class="container">

        <a class="navbar-brand">
            Sistema de Gerenciamento de Tarefas
        </a>

        <button
            class="btn btn-light"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#collapsibleForm">

            + Nova Tarefa

        </button>
    </div>
</nav>

<div class="container my-4">

<div class="collapse" id="collapsibleForm">

<div class="card shadow-sm mb-4">

<div class="card-body">

<form id="formTarefa">

<!-- Campo simples para saber se estamos editando -->
<input type="hidden" id="editarStatus">

<div class="mb-3">

<label class="form-label">

Título da tarefa

</label>

<input
type="text"
class="form-control"
id="tituloTarefa"
placeholder="Digite o título"
required>

</div>
<div class="mb-3">
  
<label class="form-label">

Descrição

</label>

<textarea
class="form-control"
rows="3"
id="descricaoTarefa"
placeholder="Digite uma descrição"></textarea>

</div>

<!-- Adicionei o campo de status, simples -->
<div class="mb-3">
    <label class="form-label">Status</label>
    <select class="form-select" id="statusTarefa">
        <option value="afazer">A Fazer</option>
        <option value="progresso">Em Progresso</option>
        <option value="concluido">Concluído</option>
    </select>
</div>

<div class="text-end">

<button
type="submit"
class="btn btn-success" id="botaoSalvar">

Adicionar

</button>

<button
type="button"
class="btn btn-secondary"
data-bs-toggle="collapse"
data-bs-target="#collapsibleForm">

Cancelar

</button>
</div>
</form>
</div>
</div>

  <div class="row g-4">

    <!-- A Fazer -->
    <div class="col-md-4">

        <div class="card kanban-card shadow-sm">

            <div class="card-header bg-primary text-white">
                A Fazer
            </div>

            <div class="card-body" id="colAfazer">

                <p class="text-muted text-center" id="msgAfazer">
                    Nenhuma tarefa cadastrada.
                </p>
            </div>
        </div>
    </div>

    <!-- Em Progresso -->
    <div class="col-md-4">

        <div class="card kanban-card shadow-sm">

            <div class="card-header bg-warning">
                Em Progresso
            </div>

            <div class="card-body" id="colEmProgresso">

                <p class="text-muted text-center" id="msgProgresso">
                    Nenhuma tarefa cadastrada.
                </p>
            </div>
        </div>
    </div>

    <!-- Concluído -->
    <div class="col-md-4">

        <div class="card kanban-card shadow-sm">

            <div class="card-header bg-success text-white">
                Concluído
            </div>

            <div class="card-body" id="colConcluido">

                <p class="text-muted text-center" id="msgConcluido">
                    Nenhuma tarefa cadastrada.
                </p>
            </div>
        </div>
    </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>
(function () {

    var form = document.getElementById("formTarefa");
    var colAfazer = document.getElementById("colAfazer");
    var colProgresso = document.getElementById("colEmProgresso");
    var colConcluido = document.getElementById("colConcluido");
    var msgAfazer = document.getElementById("msgAfazer");
    var msgProgresso = document.getElementById("msgProgresso");
    var msgConcluido = document.getElementById("msgConcluido");
    var campoEditar = document.getElementById("editarStatus");
    var botaoSalvar = document.getElementById("botaoSalvar");

    var collapseEl = document.getElementById("collapsibleForm");
    var collapse = new bootstrap.Collapse(collapseEl, {
        toggle: false
    });

    // Função simples para verificar se coluna está vazia
    function verificarVazio(coluna, mensagem) {
        if (coluna.children.length == 0) {
            coluna.appendChild(mensagem);
        }
    }

    form.addEventListener("submit", function (e) {

        e.preventDefault();

        var titulo = document.getElementById("tituloTarefa").value.trim();
        var descricao = document.getElementById("descricaoTarefa").value.trim();
        var status = document.getElementById("statusTarefa").value;
        var statusAntigo = campoEditar.value;

        if (titulo == "") {
            return;
        }

        // Se for edição, remove a tarefa antiga
        if (statusAntigo != "") {
            var colunaAntiga;
            if (statusAntigo == "afazer") colunaAntiga = colAfazer;
            if (statusAntigo == "progresso") colunaAntiga = colProgresso;
            if (statusAntigo == "concluido") colunaAntiga = colConcluido;

            var tarefaAntiga = colunaAntiga.querySelector(".tarefa");
            if (tarefaAntiga) tarefaAntiga.remove();
            verificarVazio(colunaAntiga, statusAntigo == "afazer" ? msgAfazer : statusAntigo == "progresso" ? msgProgresso : msgConcluido);
        }

        // Remove mensagem de vazio da coluna nova
        if (status == "afazer" && msgAfazer.parentElement == colAfazer) msgAfazer.remove();
        if (status == "progresso" && msgProgresso.parentElement == colProgresso) msgProgresso.remove();
        if (status == "concluido" && msgConcluido.parentElement == colConcluido) msgConcluido.remove();

        var data = new Date();

        var dia = String(data.getDate()).padStart(2, "0");
        var mes = String(data.getMonth() + 1).padStart(2, "0");
        var ano = data.getFullYear();

        var card = document.createElement("div");

        card.className = "card tarefa shadow-sm " + status;

        // Texto e cor do status
        var textoStatus = "A Fazer";
        var corBadge = "bg-primary";
        if (status == "progresso") {
            textoStatus = "Em Progresso";
            corBadge = "bg-warning text-dark";
        }
        if (status == "concluido") {
            textoStatus = "Concluído";
            corBadge = "bg-success";
        }

        card.innerHTML = `

            <div class="card-body">

                <h5 class="titulo">${titulo}</h5>

                <p class="descricao">
                    ${descricao}
                </p>

                <hr>

                <small class="text-muted">
                    Data: ${dia}/${mes}/${ano}
                </small>

                <br>

                <small class="badge ${corBadge} mt-2">
                    ${textoStatus}
                </small>

                <div class="botoes">

                    <button class="btn btn-outline-primary btn-sm editar">
                        Editar
                    </button>

                    <button class="btn btn-outline-danger btn-sm excluir">
                        Excluir
                    </button>
                </div>
            </div>

        `;

        // Botão excluir (igual ao original)
        card.querySelector(".excluir").addEventListener("click", function () {
            card.remove();
            verificarVazio(colAfazer, msgAfazer);
            verificarVazio(colProgresso, msgProgresso);
            verificarVazio(colConcluido, msgConcluido);
        });

        // Botão editar - FUNCIONANDO, simples
        card.querySelector(".editar").addEventListener("click", function () {
            document.getElementById("tituloTarefa").value = titulo;
            document.getElementById("descricaoTarefa").value = descricao;
            document.getElementById("statusTarefa").value = status;
            campoEditar.value = status;
            botaoSalvar.textContent = "Atualizar";
            collapse.show();
        });

        // Adiciona na coluna correta
        if (status == "afazer") colAfazer.appendChild(card);
        if (status == "progresso") colProgresso.appendChild(card);
        if (status == "concluido") colConcluido.appendChild(card);

        // Reseta formulário
        form.reset();
        campoEditar.value = "";
        botaoSalvar.textContent = "Adicionar";
        collapse.hide();

    });

})();
</script>
</body>
</html>
