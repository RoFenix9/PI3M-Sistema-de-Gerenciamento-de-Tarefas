<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gerenciamento de Tarefas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .navbar{
            box-shadow:0 2px 5px rgba(0,0,0,.15);
        }

        .kanban-card{
            min-height:450px;
        }

        .card-header{
            font-weight:bold;
            text-align:center;
        }

        .tarefa{
            border-left:5px solid #0d6efd;
            margin-bottom:12px;
            transition:.2s;
        }

        .tarefa:hover{
            transform:scale(1.02);
        }

        .titulo{
            font-size:18px;
            font-weight:bold;
        }

        .descricao{
            color:#555;
            margin-top:8px;
        }

        .botoes{
            margin-top:12px;
        }

        textarea{
            resize:none;
        }

    </style>

</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

    <div class="container">

        <a class="navbar-brand">
            Sistema de Gerenciamento de Tarefas
        </a>

        <button
            class="btn btn-light"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#collapsibleForm">

            + Nova Tarefa

        </button>
    </div>
</nav>

<div class="container my-4">

<div class="collapse" id="collapsibleForm">

<div class="card shadow-sm mb-4">

<div class="card-body">

<form id="formTarefa">

<div class="mb-3">

<label class="form-label">

Título da tarefa

</label>

<input
type="text"
class="form-control"
id="tituloTarefa"
placeholder="Digite o título"
required>

</div>
<div class="mb-3">
  
<label class="form-label">

Descrição

</label>

<textarea
class="form-control"
rows="3"
id="descricaoTarefa"
placeholder="Digite uma descrição"></textarea>

</div>

<div class="text-end">

<button
type="submit"
class="btn btn-success">

Adicionar

</button>

<button
type="button"
class="btn btn-secondary"
data-bs-toggle="collapse"
data-bs-target="#collapsibleForm">

Cancelar

</button>
</div>
</form>
</div>
</div>

  <div class="row g-4">

    <!-- A Fazer -->
    <div class="col-md-4">

        <div class="card kanban-card shadow-sm">

            <div class="card-header bg-primary text-white">
                A Fazer
            </div>

            <div class="card-body" id="colAfazer">

                <p class="text-muted text-center" id="msgAfazer">
                    Nenhuma tarefa cadastrada.
                </p>
            </div>
        </div>
    </div>

    <!-- Em Progresso -->
    <div class="col-md-4">

        <div class="card kanban-card shadow-sm">

            <div class="card-header bg-warning">
                Em Progresso
            </div>

            <div class="card-body" id="colEmProgresso">

                <p class="text-muted text-center">
                    Nenhuma tarefa cadastrada.
                </p>
            </div>
        </div>
    </div>

    <!-- Concluído -->
    <div class="col-md-4">

        <div class="card kanban-card shadow-sm">

            <div class="card-header bg-success text-white">
                Concluído
            </div>

            <div class="card-body" id="colConcluido">

                <p class="text-muted text-center">
                    Nenhuma tarefa cadastrada.
                </p>
            </div>
        </div>
    </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>
(function () {

    var form = document.getElementById("formTarefa");
    var colAfazer = document.getElementById("colAfazer");
    var mensagem = document.getElementById("msgAfazer");

    var collapseEl = document.getElementById("collapsibleForm");
    var collapse = new bootstrap.Collapse(collapseEl, {
        toggle: false
    });

    form.addEventListener("submit", function (e) {

        e.preventDefault();

        var titulo = document.getElementById("tituloTarefa").value.trim();
        var descricao = document.getElementById("descricaoTarefa").value.trim();

        if (titulo == "") {
            return;
        }

        if (mensagem) {
            mensagem.remove();
            mensagem = null;
        }

        var data = new Date();

        var dia = String(data.getDate()).padStart(2, "0");
        var mes = String(data.getMonth() + 1).padStart(2, "0");
        var ano = data.getFullYear();

        var card = document.createElement("div");

        card.className = "card tarefa shadow-sm";

        card.innerHTML = `

            <div class="card-body">

                <h5 class="titulo">${titulo}</h5>

                <p class="descricao">
                    ${descricao}
                </p>

                <hr>

                <small class="text-muted">
                    Data: ${dia}/${mes}/${ano}
                </small>

                <br>

                <small class="badge bg-primary mt-2">
                    A Fazer
                </small>

                <div class="botoes">

                    <button class="btn btn-outline-primary btn-sm">
                        Editar
                    </button>

                    <button class="btn btn-outline-danger btn-sm excluir">
                        Excluir
                    </button>
                </div>
            </div>

        `;

        card.querySelector(".excluir").addEventListener("click", function () {

            card.remove();

            if (colAfazer.children.length == 0) {

                colAfazer.innerHTML = `
                    <p class="text-muted text-center" id="msgAfazer">
                        Nenhuma tarefa cadastrada.
                    </p>
                `;

                mensagem = document.getElementById("msgAfazer");
            }
        });
        colAfazer.appendChild(card);
        form.reset();
        collapse.hide();

    });

})();

</script>
</body>
</html>
